<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Order Line</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="container">
        <h1>Update Order Line</h1>
        <form method="POST" action="{{ url_for('update_order_line', order_line_id=order_line['Order_Line_ID']) }}">
            <div class="form-group">
                <label for="sale_id">Sale:</label>
                <select id="sale_id" name="sale_id" required class="form-control">
                    {% for sale in sales %}
                    <option value="{{ sale['Sale_ID'] }}" {% if sale['Sale_ID'] == order_line['Sale_ID'] %}selected{% endif %}>
                        {{ sale['Sale_ID'] }} - {{ sale['Date'] }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="car_id">Car:</label>
                <select id="car_id" name="car_id" class="form-control">
                    <option value="">None</option>
                    {% for car in cars %}
                    <option value="{{ car['Car_ID'] }}" {% if car['Car_ID'] == order_line['Car_ID'] %}selected{% endif %}>
                        {{ car['Model'] }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="service_id">Service:</label>
                <select id="service_id" name="service_id" class="form-control">
                    <option value="">None</option>
                    {% for service in services %}
                    <option value="{{ service['Service_ID'] }}" {% if service['Service_ID'] == order_line['Service_ID'] %}selected{% endif %}>
                        {{ service['TypeSer'] }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="real_price">Real Price:</label>
                <input type="number" step="0.01" id="real_price" name="real_price" value="{{ order_line['Real_Price'] }}" required class="form-control">
            </div>
            <div class="form-group">
                <label for="discount_percentage">Discount Percentage:</label>
                <input type="number" step="0.01" id="discount_percentage" name="discount_percentage" value="{{ order_line['Discount_Percentage'] }}" class="form-control">
            </div>
            <button type="submit" class="btn btn-primary">Update Order Line</button>
        </form>
    </div>
</body>
</html>
