<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Management</title>
    <style>
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: url('{{ url_for("static", filename="images/customer.jpeg") }}') no-repeat center center fixed;
            background-size: cover; /* Full-page background */
            color: #333;
        }

        /* Top Bar Styling */
        .top-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px 20px;
            position: fixed;
            top: 0;
            width: 100%;
            background-color: rgba(0, 0, 0, 0.5); /* Transparent background */
            color: #f8f8f8;
            font-size: 0.9rem;
            z-index: 10;
            backdrop-filter: blur(10px); /* Optional blur for sleek effect */
        }

        .top-bar a {
            text-decoration: none;
            color: #f8f8f8;
            margin: 0 10px;
            padding: 5px 10px;
            transition: all 0.3s ease;
        }

        .top-bar a:hover, .top-bar a:focus {
            color: #53739E; /* Gray color on hover or focus */
        }

        .top-bar a.button {
            border: 1px solid #f8f8f8;
            border-radius: 5px;
            font-weight: bold;
            padding: 7px 15px;
            transition: all 0.3s ease;
        }

        .top-bar a.button:hover, .top-bar a.button:focus {
            background-color: #53739E;
            color: #000;
        }

        main {
            padding: 20px;
            max-width: 1200px;
            margin: 80px auto; /* Add margin to account for the fixed top bar */
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        h1, h2 {
            text-align: center;
            color: #1F3857;
            margin-bottom: 20px;
        }

        .actions {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .actions button {
            padding: 10px 20px;
            background-color: #1F3857;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .actions button:hover {
            background-color: #446397;
        }

        .hidden-form {
            display: none;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            margin-bottom: 5px;
        }

        input, button {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 100%;
            margin-bottom: 10px;
        }

        button {
            background-color: #1F3857;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #446397;
        }

        .customer-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .customer-table th, .customer-table td {
            padding: 10px;
            text-align: left;
            border: 1px solid #ccc;
        }

        .customer-table th {
            background-color: #1F3857;
            color: white;
        }

        .btn-delete {
            background-color: #f44336;
            color: white;
        }

        .btn-delete:hover {
            background-color: #e53935;
        }
    </style>
    <script>
        function toggleForm(formId) {
            const form = document.getElementById(formId);
            form.style.display = form.style.display === 'none' || form.style.display === '' ? 'block' : 'none';
        }
    </script>
</head>
<body>
    <!-- Top Bar -->
    <div class="top-bar">
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('cars') }}">Our Cars</a>
        <a href="{{ url_for('contact') }}">Contact</a>
    </div>

    <main>
        <h1>Customer Management</h1>

        <!-- Action Buttons -->
        <div class="actions">
            <button onclick="toggleForm('addCustomerForm')">Add Customer</button>
            <button onclick="window.location.href='{{ url_for('customer') }}'">Refresh List</button>
        </div>

        <!-- Add Customer Form -->
        <div id="addCustomerForm" class="hidden-form">
            <h2>Add Customer</h2>
            <form method="POST" action="{{ url_for('customer') }}">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="address">Address:</label>
                <input type="text" id="address" name="address" required>

                <label for="phone">Phone:</label>
                <input type="text" id="phone" name="phone" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <button type="submit">Add Customer</button>
            </form>
        </div>

        <!-- Customer List -->
        <h2>Customer List</h2>
        <table class="customer-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Address</th>
                    <th>Phone</th>
                    <th>Email</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for customer in customers %}
                <tr>
                    <td>{{ customer['Name'] }}</td>
                    <td>{{ customer['Address'] }}</td>
                    <td>{{ customer['Phone'] }}</td>
                    <td>{{ customer['Email'] }}</td>
                    <td>
                        <form method="POST" action="{{ url_for('delete_customer', customer_id=customer['Customer_ID']) }}">
                            <button type="submit" class="btn btn-delete">Delete</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </main>
</body>
</html>
