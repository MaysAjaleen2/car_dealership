<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Sale</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)),
                url('{{ url_for("static", filename="images/customer.jpg") }}') no-repeat center center fixed;
            background-size: cover;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: white;
            color: #333;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            width: 400px;
        }

        h1 {
            font-size: 24px;
            color: #005f73;
            margin-bottom: 20px;
            text-align: center;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        label {
            font-weight: bold;
            color: #555;
        }

        input, select {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        input:focus, select:focus {
            border: 2px solid #005f73;
            outline: none;
        }

        button {
            padding: 12px;
            font-size: 16px;
            color: white;
            background-color: #005f73;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #004f63;
        }

        .back-link {
            display: block;
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
            color: #005f73;
            text-decoration: none;
        }

        .back-link:hover {
            color: #004f63;
        }
    </style>
    <script>
        // Update Total Amount based on selected car price and quantity
        function updateTotalAmount() {
            const carDropdown = document.getElementById('car_id');
            const quantityInput = document.getElementById('quantity');
            const totalAmountInput = document.getElementById('total_amount');

            const selectedOption = carDropdown.options[carDropdown.selectedIndex];
            const carPrice = parseFloat(selectedOption.getAttribute('data-price')) || 0;

            const quantity = parseInt(quantityInput.value) || 1;
            totalAmountInput.value = (carPrice * quantity).toFixed(2);
        }
    </script>
</head>
<body>
    <div class="container">
        <h1>Add Sale</h1>
        <form method="POST" action="/add-sale">
            <label for="date">Date:</label>
            <input type="date" id="date" name="date" required>

            <label for="customer_id">Customer:</label>
            <select id="customer_id" name="customer_id" required>
                {% for customer in customers %}
                <option value="{{ customer['Customer_ID'] }}">{{ customer['Customer_ID'] }} - {{ customer['Name'] }}</option>
                {% endfor %}
            </select>

            <label for="car_id">Car:</label>
            <select id="car_id" name="car_id" required>
                {% if car_details %}
                <option value="{{ car_details['Car_ID'] }}" selected>
                    {{ car_details['Model'] }} - ₪{{ car_details['Price'] }}
                </option>
                {% endif %}
            </select>

            <label for="quantity">Quantity:</label>
            <input type="number" id="quantity" name="quantity" value="1" oninput="updateTotalAmount()" required>

            <label for="total_amount">Total Amount:</label>
            <input type="number" id="total_amount" name="total_amount" value="{{ car_details['Price'] if car_details else '' }}" readonly required>

            <label for="payment_method">Payment Method:</label>
            <select id="payment_method" name="payment_method" required>
                <option value="Visa">Visa</option>
                <option value="Cash">Cash</option>
            </select>

            <button type="submit">Buy</button>
        </form>

        <script>
            function updateTotalAmount() {
                const quantity = document.getElementById('quantity').value || 1;
                const carPrice = {{ car_details['Price'] if car_details else 0 }};
                document.getElementById('total_amount').value = (quantity * carPrice).toFixed(2);
            }
        </script>

        <a href="/sales" class="back-link">Back to Sales</a>
    </div>

</body>
</html>
