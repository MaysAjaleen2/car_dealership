<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Service</title>
    <style>
        /* General Styling */
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(to bottom, rgba(31, 56, 87, 0.9), rgba(31, 56, 87, 0.9)),
                        url('{{ url_for("static", filename="images/bg2.jpg") }}') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
        }

        .container {
            background-color: rgba(43, 64, 87, 0.95);
            padding: 30px 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            width: 400px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 300%;
            height: 300%;
            background: radial-gradient(circle at center, rgba(0, 245, 212, 0.15), transparent);
            transform: rotate(0deg);
            animation: pulse 6s linear infinite;
            z-index: 0;
        }

        @keyframes pulse {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .container h1 {
            font-size: 2rem;
            color: #00d4ff;
            margin-bottom: 20px;
            font-weight: bold;
            z-index: 1;
            position: relative;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 1;
            position: relative;
        }

        label {
            text-align: left;
            font-weight: bold;
            color: #cce7f0;
        }

        input[type="text"], input[type="date"], input[type="number"] {
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            background-color: #e8f1f5;
            color: #1F3857;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            transition: box-shadow 0.3s ease, border 0.3s ease;
        }

        input:focus {
            outline: none;
            border: 2px solid #00d4ff;
            box-shadow: 0 0 10px #00d4ff;
        }

        button {
            background: linear-gradient(90deg, #00b4d8, #0056b3);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.3s ease;
        }

        button:hover {
            transform: scale(1.05);
            background: linear-gradient(90deg, #0056b3, #003b73);
            box-shadow: 0 8px 20px rgba(0, 123, 255, 0.4);
        }

        .back-link {
            display: inline-block;
            margin-top: 15px;
            color: #cce7f0;
            font-weight: bold;
            text-decoration: none;
            transition: color 0.3s ease, text-shadow 0.3s ease;
        }

        .back-link:hover {
            color: #00d4ff;
            text-shadow: 0px 0px 5px rgba(0, 245, 212, 0.8);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Update Service</h1>
        <form method="POST">
            <label for="type">Service Type:</label>
            <input type="text" id="type" name="type" value="{{ service[1] }}" required>

            <label for="date">Date:</label>
            <input type="date" id="date" name="date" value="{{ service[2] }}" required>

            <label for="price">Price:</label>
            <input type="number" id="price" name="price" step="0.01" value="{{ service[3] }}" required>

            <label for="employee_id">Employee ID:</label>
            <input type="number" id="employee_id" name="employee_id" value="{{ service[4] }}" required>

            <button type="submit">Update Service</button>
        </form>
        <a href="/services" class="back-link">Back to Services</a>
    </div>
</body>
</html>
