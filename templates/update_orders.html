<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Order Line</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom right, #304352, #697285);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.9);
            color: #333;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            width: 400px;
            text-align: center;
        }

        .container h1 {
            font-size: 24px;
            color: ##7D9EB5;
            margin-bottom: 20px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        label {
            font-weight: bold;
            text-align: left;
            color: #333;
        }

        select, input[type="number"] {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 5px;
            transition: border 0.3s ease;
            background: #f8f8f8;
            color: #333;
        }

        select:focus, input[type="number"]:focus {
            outline: none;
            border: 2px solid ##345280;
        }

        button {
            padding: 12px;
            font-size: 16px;
            color: white;
            background-color: #2f3f57;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.3s ease;
        }

        button:hover {
            background-color: #526682;
            transform: translateY(-2px);
        }

        .back-link {
            display: block;
            margin-top: 15px;
            text-decoration: none;
            color: #005f73;
            font-weight: bold;
        }

        .back-link:hover {
            color: #004f63;
        }

        .flash-messages {
            margin-bottom: 20px;
            text-align: center;
        }

        .alert {
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            font-size: 14px;
        }

        .alert-success {
            background-color: #d4edda;
            color: #155724;
        }

        .alert-error {
            background-color: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Update Order Line</h1>

        <!-- Flash Messages -->
        <div class="flash-messages">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
        </div>

        <!-- Update Order Form -->
        <form method="POST">
            <label for="sale_id">Sale:</label>
            <select id="sale_id" name="sale_id" required>
                {% for sale in sales %}
                <option value="{{ sale['Sale_ID'] }}" {% if sale['Sale_ID'] == order_line['Sale_ID'] %}selected{% endif %}>
                    Sale ID: {{ sale['Sale_ID'] }} (Date: {{ sale['Date'] }})
                </option>
                {% endfor %}
            </select>

            <label for="car_id">Car:</label>
            <select id="car_id" name="car_id">
                <option value="">-- Select a Car --</option>
                {% for car in cars %}
                <option value="{{ car['Car_ID'] }}" {% if car['Car_ID'] == order_line['Car_ID'] %}selected{% endif %}>
                    {{ car['Model'] }} - ₪{{ car['Price'] }}
                </option>
                {% endfor %}
            </select>

            <label for="service_id">Service:</label>
            <select id="service_id" name="service_id">
                <option value="" {% if not order_line['Service_ID'] %}selected{% endif %}>None</option>
                {% for service in services %}
                <option value="{{ service['Service_ID'] }}" {% if service['Service_ID'] == order_line['Service_ID'] %}selected{% endif %}>
                    {{ service['TypeSer'] }} - ₪{{ service['Price'] }}
                </option>
                {% endfor %}
            </select>

            <label for="real_price">Real Price:</label>
            <input type="number" id="real_price" name="real_price" value="{{ order_line['Real_Price'] }}" step="0.01" required>

            <label for="discount_percentage">Discount Percentage:</label>
            <input type="number" id="discount_percentage" name="discount_percentage" value="{{ order_line['Discount_Percentage'] }}" step="0.01" min="0" max="100">

            <button type="submit">Update Order Line</button>
        </form>

        <a href="/view-orders" class="back-link">Back to Orders</a>
    </div>
</body>
</html>
