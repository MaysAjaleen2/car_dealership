<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Order Line</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="container">
        <h1>Add Order Line</h1>
        <form method="POST" action="{{ url_for('add_order_line') }}">
            <div class="form-group">
                <label for="sale_id">Sale ID:</label>
                <input type="number" id="sale_id" name="sale_id" required class="form-control">
            </div>
            <div class="form-group">
                <label for="car_id">Car ID:</label>
                <input type="number" id="car_id" name="car_id" class="form-control">
            </div>
            <div class="form-group">
                <label for="service_id">Service ID:</label>
                <input type="number" id="service_id" name="service_id" class="form-control">
            </div>
            <div class="form-group">
                <label for="real_price">Real Price:</label>
                <input type="number" step="0.01" id="real_price" name="real_price" required class="form-control">
            </div>
            <div class="form-group">
                <label for="discount_percentage">Discount Percentage:</label>
                <input type="number" step="0.01" id="discount_percentage" name="discount_percentage" class="form-control">
            </div>
            <button type="submit" class="btn btn-primary">Add Order Line</button>
        </form>
    </div>
</body>
</html>
